name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id=$(gh api repos/${{ github.repository }}/releases \
            --method POST \
            --field tag_name="${{ github.ref_name }}" \
            --field name="StayUp ${{ github.ref_name }}" \
            --field body="## Téléchargements

          | Plateforme | Fichier |
          |---|---|
          | macOS (Apple Silicon) | \`StayUp_*_aarch64.dmg\` |
          | macOS (Intel) | \`StayUp_*_x64.dmg\` |
          | Windows | \`StayUp_*_x64-setup.exe\` |
          | Linux | \`StayUp_*_amd64.AppImage\` |

          Voir les assets ci-dessous pour tous les installateurs." \
            --field draft=true \
            --jq '.id')
          echo "release_id=$release_id" >> $GITHUB_OUTPUT

  build:
    needs: create-release
    name: Build & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Set signing key
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          printf '%s' "$KEY" > /tmp/signing.key
          echo "TAURI_SIGNING_PRIVATE_KEY=$(cat /tmp/signing.key)" >> $GITHUB_ENV

      - name: Build & upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          args: ${{ matrix.args }}

  snap:
    needs: create-release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build
        with:
          snapcraft-channel: stable

      - name: Publish snap
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
            --method PATCH \
            --field draft=false

      - name: Update Homebrew cask
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          ARM_SHA=$(gh release download "${{ github.ref_name }}" \
            --repo sindus/stayup-desktop \
            --pattern "StayUp_${VERSION}_aarch64.dmg" \
            --output - | sha256sum | awk '{print $1}')
          X64_SHA=$(gh release download "${{ github.ref_name }}" \
            --repo sindus/stayup-desktop \
            --pattern "StayUp_${VERSION}_x64.dmg" \
            --output - | sha256sum | awk '{print $1}')

          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=no" \
            git clone git@github.com:sindus/homebrew-tap.git /tmp/homebrew-tap

          cd /tmp/homebrew-tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/stayup.rb
          sed -i "/on_arm/,/end/{s/sha256 \".*\"/sha256 \"${ARM_SHA}\"/}" Casks/stayup.rb
          sed -i "/on_intel/,/end/{s/sha256 \".*\"/sha256 \"${X64_SHA}\"/}" Casks/stayup.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/stayup.rb
          git diff --staged --quiet || \
            GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=no" \
            git commit -m "chore: update StayUp to ${VERSION}" && \
            GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=no" \
            git push
