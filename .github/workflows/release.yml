name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: StayUp ${{ github.ref_name }}
          releaseBody: |
            ## Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | macOS (Apple Silicon) | `StayUp_*_aarch64.dmg` |
            | macOS (Intel) | `StayUp_*_x64.dmg` |
            | Windows | `StayUp_*_x64-setup.exe` |
            | Linux | `StayUp_*_amd64.AppImage` |

            Voir les [assets ci-dessous](#) pour tous les installateurs.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
