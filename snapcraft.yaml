name: stayup
base: core22
version: "0.5.4"
summary: Stay up to date with everything
description: |
  StayUp aggregates GitHub changelogs, YouTube videos, RSS feeds and web pages
  into a single personalized feed. Never miss a release or update again.
icon: src-tauri/icons/icon.png
grade: stable
confinement: strict

architectures:
  - build-on: amd64

parts:
  stayup:
    plugin: nil
    source: .
    build-packages:
      - curl
      - file
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - patchelf
      - build-essential
      - xdg-utils
    build-snaps:
      - node/20/stable
    override-build: |
      cd $SNAPCRAFT_PART_SRC
      # Local build (--destructive-mode): reuse user's rustup to avoid re-downloading
      if [ -d "/home/sikander/.cargo" ]; then
        export CARGO_HOME=/home/sikander/.cargo
        export RUSTUP_HOME=/home/sikander/.rustup
      else
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
        export CARGO_HOME="$HOME/.cargo"
        export RUSTUP_HOME="$HOME/.rustup"
      fi
      export PATH="$CARGO_HOME/bin:$PATH"
      npm ci
      npm run build
      cd src-tauri && cargo build --release && cd $SNAPCRAFT_PART_SRC
      install -Dm755 \
        src-tauri/target/release/stayup-desktop \
        "$SNAPCRAFT_PART_INSTALL/usr/bin/stayup"
      install -Dm644 \
        src-tauri/icons/128x128.png \
        "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/stayup.png"
      install -Dm644 \
        src-tauri/icons/32x32.png \
        "$SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps/stayup.png"
      install -Dm644 \
        src-tauri/stayup.desktop \
        "$SNAPCRAFT_PART_INSTALL/usr/share/applications/stayup.desktop"
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - libgtk-3-0
      - libglib2.0-0
      - libgdk-pixbuf-2.0-0
      - librsvg2-2
      - libpango-1.0-0
      - libcairo2

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1

plugs:
  browser-support:
    allow-sandbox: false

apps:
  stayup:
    command: usr/bin/stayup
    desktop: usr/share/applications/stayup.desktop
    extensions: [gnome]
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      GDK_BACKEND: "wayland"
      BAMF_DESKTOP_FILE_HINT: /var/lib/snapd/desktop/applications/stayup_stayup.desktop
    plugs:
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl
      - audio-playback
      - browser-support
      - gsettings
